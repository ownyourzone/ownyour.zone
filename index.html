<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ownyourzone</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: black;
    }

    .anarchy {
        position: relative;
        width: 200px;
        height: 200px;
    }

    .anarchy .circle {
        width: 100%;
        height: 100%;
        border: 5px solid red;
        border-radius: 50%;
        position: absolute;
        top: 0;
        left: 0;
    }

    .anarchy .letter {
        position: absolute;
        font-size: 180px;
        color: red;
        top: -10px; /* iese puțin în afara cercului */
        left: 10px;
        font-weight: bold;
        transform: rotate(-10deg);
    }
</style>
</head>
<body>
    <div class="anarchy">
        <div class="circle"></div>
        <div class="letter">A</div>
    </div>
</body>
</html>
