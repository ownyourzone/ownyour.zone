<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Own Your Zone</title>
  <style>
    * { box-sizing: border-box; }body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  font-family: Arial, Helvetica, sans-serif;
  background: #000;
  color: #fff;
}

.container {
  text-align: center;
  max-width: 900px;
  padding: 20px;
  opacity: 0;
  transform: scale(1.05);
}

.intro {
  animation: introAnim 1.2s ease-out forwards;
}

@keyframes introAnim {
  0% {
    opacity: 0;
    transform: scale(1.08);
  }
  100% {
    opacity: 1;
    transform: scale(1);
  }
}

.main-text {
  font-size: 3.2rem;
  font-weight: bold;
  margin-bottom: 10px;
  color: #fff;
  text-shadow: none;
}

.sub-text {
  font-size: 1.3rem;
  margin-bottom: 20px;
  opacity: 0.9;
  color: #fff;
  text-shadow: none;
}

.description {
  font-size: 0.95rem;
  opacity: 0.85;
  line-height: 1.6;
  color: #fff;
  text-shadow: none;
}

  </style>
</head>
<body>  <div class="container" id="container">
    <div class="main-text">ゾーンを持て</div>
    <div class="sub-text">Own Your Zone</div>
    <div class="description">
      To take total control of your life, consciously choosing the people, actions and environment that bring you value and eliminating anything that negatively affects your balance
    </div>
  </div>  <script>
    window.addEventListener("load", () => {
      const el = document.getElementById("container");
      el.classList.add("intro");
    });
  </script></body>
</html>
