<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ownyourzone</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        background-color: black;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: 'Impact', sans-serif;
    }

    .circle {
        position: absolute;
        width: 200px;
        height: 200px;
        border: 6px solid red;
        border-radius: 50%;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) rotate(-5deg) scale(1.05, 0.95);
        box-shadow: 0 0 10px red, 0 0 15px red;
        /* neregularitate */
        clip-path: polygon(
            5% 10%, 95% 5%, 100% 50%, 95% 95%, 5% 90%, 0% 50%
        );
    }

    .graffiti {
        color: red;
        font-size: 160px;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) rotate(-15deg) skewX(-10deg);
        text-shadow:
            2px 2px 0 #900,
           -2px -2px 0 #900,
            2px -2px 0 #900,
           -2px 2px 0 #900;
    }
</style>
</head>
<body>
    <div class="circle"></div>
    <div class="graffiti">A</div>
</body>
</html>
