<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Own Your Zone</title>
  <style>
    * { box-sizing: border-box; }body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background-color: #000;
  color: #fff;
  font-family: Arial, Helvetica, sans-serif;
  overflow: hidden;
}

.container {
  text-align: center;
  max-width: 800px;
  padding: 20px;
  position: relative;
}

.main-text {
  font-size: 3rem;
  font-weight: bold;
  margin-bottom: 10px;
}

.sub-text {
  font-size: 1.2rem;
  opacity: 0.8;
  margin-bottom: 20px;
}

.description {
  font-size: 0.9rem;
  opacity: 0.7;
  line-height: 1.6;
}

/* GLITCH EFFECT */
.glitch {
  animation: glitchAnim 1s;
}

@keyframes glitchAnim {
  0% {
    transform: translate(0);
    filter: hue-rotate(0deg) contrast(1);
  }
  10% {
    transform: translate(-5px, 3px) skewX(10deg);
    filter: hue-rotate(90deg) contrast(1.5);
  }
  20% {
    transform: translate(5px, -3px) skewY(-10deg);
    filter: hue-rotate(180deg) contrast(2);
  }
  40% {
    transform: translate(-3px, 2px);
  }
  60% {
    transform: translate(3px, -2px);
  }
  80% {
    transform: translate(0);
  }
  100% {
    transform: translate(0);
    filter: hue-rotate(0deg) contrast(1);
  }
}

/* FLICKER EFFECT */
.flicker {
  animation: flickerAnim 1s;
}

@keyframes flickerAnim {
  0% { opacity: 1; }
  10% { opacity: 0.2; }
  20% { opacity: 1; }
  30% { opacity: 0.4; }
  40% { opacity: 1; }
  60% { opacity: 0.1; }
  80% { opacity: 1; }
  100% { opacity: 1; }
}

  </style>
</head>
<body>
  <div class="container" id="container">
    <div class="main-text">ゾーンを持て</div>
    <div class="sub-text">Own Your Zone</div>
    <div class="description">
      To take total control of your life, consciously choosing the people, actions and environment that bring you value and eliminating anything that negatively affects your balance
    </div>
  </div>  <script>
    setTimeout(() => {
      const el = document.getElementById('container');
      const body = document.body;

      el.classList.add('glitch');
      body.classList.add('flicker');

      setTimeout(() => {
        el.classList.remove('glitch');
        body.classList.remove('flicker');
      }, 1000);
    }, 5000);
  </script></body>
</html>
